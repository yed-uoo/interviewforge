{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-3 py-md-4">
    <div class="col-12 col-md-10 col-lg-7 col-xl-5">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="badge rounded-pill text-bg-primary px-3 py-2 mb-3">Welcome back</span>
                    <h1 class="h3 fw-semibold mb-2">Sign in to InterviewForge</h1>
                    <p class="text-secondary mb-0">Access your AI interview preparation workspace.</p>
                </div>

                <form method="post" class="d-grid gap-3">
                    {% csrf_token %}
                    <div class="auth-form">
                        {{ form.as_p }}
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        Login
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-secondary mb-2">New to InterviewForge?</p>
                    <a href="{% url 'signup' %}" class="btn btn-outline-secondary w-100">
                        Create account
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-form p {
        margin-bottom: 1rem;
    }

    .auth-form label {
        display: inline-block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #334155;
    }

    .auth-form input,
    .auth-form select,
    .auth-form textarea {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        background-color: #fff;
        color: #0f172a;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .auth-form input:focus,
    .auth-form select:focus,
    .auth-form textarea:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.12);
        outline: 0;
    }

    .auth-form ul.errorlist {
        list-style: none;
        padding-left: 0;
        margin: 0 0 0.75rem 0;
        color: #dc3545;
        font-size: 0.875rem;
    }
</style>
{% endblock %}
