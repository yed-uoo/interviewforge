<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewForge</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --if-surface: #0f172a;
            --if-surface-2: #111827;
            --if-border: rgba(148, 163, 184, 0.18);
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.10), transparent 28%),
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.08), transparent 24%),
                #f8fafc;
        }

        .app-shell {
            min-height: 100vh;
        }

        .app-navbar {
            background: linear-gradient(135deg, var(--if-surface), var(--if-surface-2));
            border-bottom: 1px solid var(--if-border);
        }

        .brand-mark {
            letter-spacing: 0.02em;
        }

        .content-wrap {
            flex: 1 0 auto;
        }

        .page-surface {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.20);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.06);
        }

        .app-footer {
            border-top: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(248, 250, 252, 0.9);
        }
    </style>
</head>
<body class="bg-light text-body">
<div class="app-shell d-flex flex-column">

<nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-semibold brand-mark" href="/">InterviewForge</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
            <div class="d-flex flex-column flex-lg-row gap-2 pt-3 pt-lg-0 ms-lg-auto">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-sm px-3">Dashboard</a>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm px-3">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm px-3">Login</a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm px-3">Sign up</a>
            {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="content-wrap py-5">
    <div class="container">
        <div class="page-surface rounded-4 p-4 p-md-5">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</main>

<footer class="app-footer mt-auto py-4">
    <div class="container">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 small text-secondary">
            <span>InterviewForge</span>
            <span>AI interview preparation platform for modern candidates and teams.</span>
        </div>
    </div>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
